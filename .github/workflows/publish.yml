name: Publish to PyPI

# Publish to PyPI manually (workflow_dispatch).
# Auth uses OIDC Trusted Publishing, so no API token is needed.
# Register the Trusted Publisher on PyPI beforehand:
#   - PyPI Project: pyappdist
#   - Owner: atsuoishimoto / Repository: pyappdist
#   - Workflow: publish.yml
#   - Environment: pypi
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Build sdist and wheel
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyappdist
    permissions:
      id-token: write   # required to mint the OIDC token (Trusted Publishing)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
