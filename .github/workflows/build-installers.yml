name: Build installers

# 手動実行（workflow_dispatch）で samples 以下の各プロジェクトを 3 OS
# （Linux / Windows / macOS-arm）でビルドする。ビルドの実体は uv-matrix の
# `build-installers` マトリクス。各セルは `when = "target.startswith(platform)"`
# で自分の OS のターゲットだけを実行するので、同じコマンドを各ランナーで走らせる。
on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false   # 1 OS の失敗が他の OS をキャンセルしないようにする
      matrix:
        include:
          - os: ubuntu-latest
            artifact: installers-linux
          - os: windows-latest
            artifact: installers-windows
          - os: macos-14          # Apple Silicon (arm64) ランナー
            artifact: installers-macos-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      # Windows の MSI 用 WiX は dotnet グローバルツール。
      # MSVC (cl.exe/rc.exe) と Windows SDK (makeappx: MSIX 用) は windows-latest に
      # プリインストール済みで、pyappdist は vswhere 経由で自動解決する。
      # macOS の Xcode CLT (clang/codesign/hdiutil/sips/iconutil)、Linux は追加不要。
      - name: Install WiX (Windows only)
        if: runner.os == 'Windows'
        run: dotnet tool install --global wix --version 5.0.2

      - name: Build installers (build-installers matrix)
        env:
          # 署名する場合のみ secret を設定（未設定なら未署名で出荷）。
          PYAPPDIST_SIGN_CMD: ${{ secrets.PYAPPDIST_SIGN_CMD }}
        run: uv run uv-matrix run --matrix build-installers

      - name: Upload installers
        if: always()      # ビルドが途中失敗しても成功分は必ずアップロード
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: samples/*/appdist/*/dist/*
          if-no-files-found: warn
