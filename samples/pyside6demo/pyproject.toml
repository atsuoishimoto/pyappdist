[project]
name = "pyside6demo"
version = "0.1.0"
description = "PySide6 GUI sample for pyappdist"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "PySide6>=6.7",
]

[project.scripts]
pyside6demo = "pyside6demo:main"

[dependency-groups]
dev = [
    "pyappdist",
]

[tool.pyappdist]
name = "PySide6 Demo"
python = "3.12"
identifier = "com.example.pyside6demo"   # CFBundleIdentifier (required for macapp/dmg)

launchers = [
  { name = "pyside6demo", entry = "pyside6demo:main", gui = true, icon = { windows = "assets/pyside6demo.ico", macos = "assets/pyside6demo.png", linux = "assets/pyside6demo.png" } },
]

[[tool.pyappdist.targets]]
name = "win32-msi"
platform = "windows-x86_64"
format = "msi"
# upgrade-code = "..."    # auto-generated and written back if omitted
manufacturer = "Example Inc."
code-sign = false
allow-same-version-upgrades = false

[[tool.pyappdist.targets]]
name = "win32-store"
platform = "windows-x86_64"
format = "msix"
manufacturer = "Example Inc."

[[tool.pyappdist.targets]]
name = "linux"
platform = "linux-x86_64"
format = "linux"
categories = "Utility;"

[[tool.pyappdist.targets]]
name = "darwin-arm"
platform = "macos-aarch64"
format = "macos"

[[tool.pyappdist.targets]]
name = "macos-intel"
platform = "macos-x86_64"
format = "macos"

[[tool.pyappdist.targets]]
name = "darwin-arm-dmg"
platform = "macos-aarch64"
format = "dmg"

[build-system]
requires = ["uv_build>=0.11.6,<0.12.0"]
build-backend = "uv_build"

