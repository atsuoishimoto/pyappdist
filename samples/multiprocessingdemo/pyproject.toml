[project]
name = "multiprocessingdemo"
version = "0.1.0"
description = "multiprocessing sample for pyappdist"
readme = "README.md"
requires-python = ">=3.11"

[project.scripts]
multiprocessingdemo = "multiprocessingdemo:main"

[dependency-groups]
dev = [
    "pyappdist",
]

[tool.pyappdist]
name = "Multiprocessing Demo"
python = "3.12"
identifier = "com.example.multiprocessingdemo"

launchers = [
  { name = "multiprocessingdemo", entry = "multiprocessingdemo:main", gui = false },
]

[[tool.pyappdist.targets]]
name = "win32-msi"
platform = "windows-x86_64"
format = "msi"
# upgrade-code = "..."    # auto-generated and written back if omitted
manufacturer = "Example Inc."
code-sign = false
allow-same-version-upgrades = false

[[tool.pyappdist.targets]]
name = "win32-store"
platform = "windows-x86_64"
format = "msix"
manufacturer = "Example Inc."

[[tool.pyappdist.targets]]
name = "linux"
platform = "linux-x86_64"
format = "linux"

[[tool.pyappdist.targets]]
name = "darwin-arm"
platform = "macos-aarch64"
format = "macos"

[[tool.pyappdist.targets]]
name = "macos-intel"
platform = "macos-x86_64"
format = "macos"

[[tool.pyappdist.targets]]
name = "darwin-arm-dmg"
platform = "macos-aarch64"
format = "dmg"

[build-system]
requires = ["uv_build>=0.11.6,<0.12.0"]
build-backend = "uv_build"
